name: LifeLenz VLH Config Explore (one-off)

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Explore VLH config endpoint
        env:
          LIFELENZ_TOKEN: ${{ secrets.LIFELENZ_TOKEN }}
        run: node scripts/lifelenz-vlh-explore.mjs
