name: QSRSoft Daily Activity Pull

on:
  schedule:
    # Times are anchored to US Central. GitHub cron is fixed UTC and does NOT
    # observe DST, so these land ~1h earlier (Central) during winter (CST).
    # 10:00 UTC = 5:00 AM CDT — previous day is fully closed by then (morning batch)
    - cron: '0 10 * * *'
    # Intraday current-day refreshes — qsr_daily_activity carries today's live sales + DT
    - cron: '0 13 * * *'   # ~8:00 AM CDT
    - cron: '0 15 * * *'   # ~10:00 AM CDT
    - cron: '0 19 * * *'   # ~2:00 PM CDT
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Max days of history on initial run (default: 90)'
        required: false
        default: '90'
      days_recent:
        description: 'Rolling re-pull window in days (default: 7)'
        required: false
        default: '7'
      force_full:
        description: 'Force full days_back pull, ignoring existing data (1 = on)'
        required: false
        default: '0'
      debug:
        description: 'Verbose logging (1 = on)'
        required: false
        default: '0'

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Pull QSRSoft Daily Activity data
        run: node scripts/qsrsoft-dar-pull.mjs
        env:
          VITE_SUPABASE_URL:          ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QSRSOFT_TOKEN:              ${{ secrets.QSRSOFT_TOKEN }}
          QSRSOFT_USERNAME:           ${{ secrets.QSRSOFT_USERNAME }}
          QSRSOFT_PASSWORD:           ${{ secrets.QSRSOFT_PASSWORD }}
          QSRSOFT_DAR_DAYS_BACK:      ${{ github.event.inputs.days_back   || '90' }}
          QSRSOFT_DAR_DAYS_RECENT:    ${{ github.event.inputs.days_recent || '7'  }}
          QSRSOFT_DAR_FORCE_FULL:     ${{ github.event.inputs.force_full  || '0'  }}
          QSRSOFT_DAR_DEBUG:          ${{ github.event.inputs.debug       || '0'  }}

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dar-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 3
