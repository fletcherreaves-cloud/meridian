name: LifeLenz Daily Sync

on:
  schedule:
    # 10:00 UTC = 5:00 AM CDT / 6:00 AM EDT — runs before stores open
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Max days of history to look back for gaps (default: 30)'
        required: false
        default: '30'
      safety_days:
        description: 'Days to always re-pull for corrections (default: 3)'
        required: false
        default: '3'
      days_fwd:
        description: 'Days of future schedule data to pull (default: 14)'
        required: false
        default: '14'
      start_date:
        description: 'Backfill from this date (YYYY-MM-DD) — bypasses gap detection. Leave blank for normal daily sync.'
        required: false
        default: ''
      debug:
        description: 'Verbose logging (1 = on)'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run LifeLenz sync
        run: node scripts/lifelenz-pull.mjs
        env:
          LIFELENZ_TOKEN:            ${{ secrets.LIFELENZ_TOKEN }}
          LIFELENZ_USERNAME:         ${{ secrets.LIFELENZ_USERNAME }}
          LIFELENZ_PASSWORD:         ${{ secrets.LIFELENZ_PASSWORD }}
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIFELENZ_DAYS_BACK:        ${{ github.event.inputs.days_back || '30' }}
          LIFELENZ_SAFETY_DAYS:      ${{ github.event.inputs.safety_days || '3' }}
          LIFELENZ_DAYS_FWD:         ${{ github.event.inputs.days_fwd || '14' }}
          LIFELENZ_START_DATE:       ${{ github.event.inputs.start_date || '' }}
          LIFELENZ_DEBUG:            ${{ github.event.inputs.debug || '0' }}

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lifelenz-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 3
