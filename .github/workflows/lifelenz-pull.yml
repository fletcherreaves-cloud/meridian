name: LifeLenz Daily Sync

on:
  schedule:
    # 10:00 UTC = 5:00 AM CDT / 6:00 AM EDT — runs before stores open
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days of history to pull (default: 30)'
        required: false
        default: '30'
      days_fwd:
        description: 'Days of future data to pull (default: 14)'
        required: false
        default: '14'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run LifeLenz sync
        run: node scripts/lifelenz-pull.mjs
        env:
          LIFELENZ_USERNAME:         ${{ secrets.LIFELENZ_USERNAME }}
          LIFELENZ_PASSWORD:         ${{ secrets.LIFELENZ_PASSWORD }}
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIFELENZ_DAYS_BACK:        ${{ github.event.inputs.days_back || '30' }}
          LIFELENZ_DAYS_FWD:         ${{ github.event.inputs.days_fwd || '14' }}

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lifelenz-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 3
