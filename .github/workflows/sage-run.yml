name: SAGE Scheduled Prompts

on:
  schedule:
    # Hourly — the script runs only the prompts whose schedule_hour matches this UTC hour.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run every enabled prompt now, ignoring the schedule match (1 = on)'
        required: false
        default: '0'
      debug:
        description: 'Verbose logging (1 = on)'
        required: false
        default: '0'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SAGE scheduled prompts
        run: node scripts/sage-run.mjs
        env:
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:    ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SAGE_RUNNER_EMAIL:         ${{ secrets.SAGE_RUNNER_EMAIL }}
          SAGE_RUNNER_PASSWORD:      ${{ secrets.SAGE_RUNNER_PASSWORD }}
          SAGE_RUN_FORCE:            ${{ github.event.inputs.force || '0' }}
          SAGE_RUN_DEBUG:            ${{ github.event.inputs.debug || '0' }}
