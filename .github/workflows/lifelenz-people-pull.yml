name: LifeLenz People Skills Sync

on:
  # Manual-only until the token-based pull is proven against the live site. Add a
  # weekly `schedule:` back once a dispatch run succeeds (skills change slowly).
  workflow_dispatch:
    inputs:
      people_urls:
        description: 'JSON array of {loc,url} People pages to pull. Blank = use the LIFELENZ_PEOPLE_URLS secret / single-page fallback.'
        required: false
        default: ''
      debug:
        description: 'Verbose logging + screenshots (1 = on)'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run People Skills sync
        run: node scripts/lifelenz-people-pull.mjs
        env:
          LIFELENZ_TOKEN:            ${{ secrets.LIFELENZ_TOKEN }}
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIFELENZ_PEOPLE_URLS:      ${{ github.event.inputs.people_urls || secrets.LIFELENZ_PEOPLE_URLS }}
          DEBUG:                     ${{ github.event.inputs.debug || '0' }}

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: people-skills-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 3
